<div class="p-8">
  <app-header-page
    title="Tus favoritos"
    subtitle="Listado de tus videos favoritos"
  ></app-header-page>
  <div class="mt-8">
    <app-compact-search
      #searchCmp
      [placeholder]="'Buscar videos...'"
      (search)="onSearch($event)"
      (cleared)="onClear()"
    ></app-compact-search>
  </div>
  <div class="mt-8">
    <app-video-list
      [videos]="videos"
      (toggledFavorite)="onToggledFavorite($event)"
    ></app-video-list>
  </div>
</div>
