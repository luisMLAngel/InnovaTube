<div class="p-8">
  <div class="mb-6">
    <button
      pButton
      icon="pi pi-arrow-left"
      label="Volver"
      class="p-button-text"
      (click)="goBack()"
    ></button>
  </div>

  @if (isLoading()) {
  <div class="flex items-center justify-center h-96">
    <p class="text-ink-secondary-w">Cargando video...</p>
  </div>
  } @else if (video()) {
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Player -->
    <div class="lg:col-span-2">
      <div class="relative w-full aspect-video rounded-lg overflow-hidden bg-black">
        <iframe
          class="absolute inset-0 w-full h-full"
          [src]="embedUrl()"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <!-- Details -->
    <div class="lg:col-span-1">
      <div class="rounded-lg bg-surface-w p-6">
        <h1 class="text-xl font-semibold text-ink-primary-w mb-4">{{ video()!.title }}</h1>

        <div class="space-y-3 mb-6">
          <p class="text-ink-secondary-w">
            <span class="font-medium">Canal:</span> {{ video()!.channelTitle }}
          </p>
          <p class="text-ink-secondary-w">
            <span class="font-medium">Publicado:</span> {{ video()!.publishedAt | date:'longDate' }}
          </p>
        </div>

        <div class="flex gap-3">
          <p-button
            [label]="video()!.isFavorite ? 'Quitar de favoritos' : 'Agregar a favoritos'"
            [icon]="video()!.isFavorite ? 'pi pi-star-fill' : 'pi pi-star'"
            [class]="video()!.isFavorite ? 'p-button-warning' : 'p-button-outlined'"
            (onClick)="toggleFavorite()"
            fluid
          ></p-button>
        </div>
      </div>
    </div>
  </div>
  } @else {
  <div class="flex items-center justify-center h-96">
    <p class="text-ink-secondary-w">Video no encontrado</p>
  </div>
  }
</div>
