<div class="min-h-screen bg-auth-w flex items-center justify-center px-4">
  <div class="max-w-md w-full text-center space-y-8">
    <!-- 404 Number -->
    <div class="space-y-4">
      <h1 class="text-9xl font-bold text-ink-primary-w opacity-20">404</h1>
      
      <!-- Error Message -->
      <div class="space-y-3">
        <h2 class="text-2xl font-semibold text-ink-primary-w">
          Página no encontrada
        </h2>
        <p class="text-ink-secondary-w text-base leading-relaxed">
          La página que estás buscando no existe o ha sido movida a otra ubicación.
        </p>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="space-y-4">
      <p-button 
        label="Ir al inicio" 
        (click)="goToHome()"
        class="w-full"
        size="large"
      />
      
      <button 
        (click)="goBack()"
        class="w-full py-3 px-4 text-ink-primary-w hover:text-ink-secondary-w transition-colors duration-200 text-sm font-medium underline-offset-4 hover:underline"
      >
        Volver a la página anterior
      </button>
    </div>

    <!-- Help Text -->
    <div class="pt-4 border-t border-stroke-w">
      <p class="text-ink-muted-w text-xs">
        Si crees que esto es un error, por favor contacta al equipo de soporte.
      </p>
    </div>
  </div>
</div>
