<div class="p-8">
  @if (!token()) {
    <h2 class="text-ink-primary-w font-medium text-xl mb-2">Restablece tu contraseña</h2>
    <p class="text-ink-secondary-w text-sm">
      Agrega tu correo electrónico para poder verificar tu cuenta.
    </p>

    <form [formGroup]="forgotPasswordFormService.form" class="mt-8 space-y-4">
      <div class="flex flex-col gap-1.5">
        <label for="email" class="text-sm text-ink-primary-w">Correo electrónico</label>
        <input
          pInputText
          id="email"
          aria-describedby="email-help"
          formControlName="email"
          variant="filled"
          errorMessage
          [showErrors]="forgotPasswordFormService.showErrorSignal()"
        />
      </div>
      <div>
        <p-button
          label="Solicitar cambio de contraseña"
          fluid
          (onClick)="onForgotPassword()"
        ></p-button>
      </div>
      <div>
        <a class="text-sm text-ink-muted-w cursor-pointer" routerLink="/auth/login"
          >¿Quieres regresar? <span class="text-ink-primary-w hover:underline">Inicia sesión</span></a
        >
      </div>
    </form>
  } @else {
    <h2 class="text-ink-primary-w font-medium text-xl mb-2">Crea tu nueva contraseña</h2>
    <p class="text-ink-secondary-w text-sm">
      Ingresa tu nueva contraseña dos veces para confirmar.
    </p>

    <form [formGroup]="resetPasswordFormService.form" class="mt-8 space-y-4">
      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-sm text-ink-primary-w">Contraseña</label>
        <p-password
          id="password"
          formControlName="password"
          variant="filled"
          fluid
          [toggleMask]="true"
          autocomplete="off"
          strongRegex="^(?=.*[A-Z])(?=.*\d)(?=.*[^\w\s]).{8,}$"
          promptLabel="Seguridad"
          weakLabel="Débil"
          mediumLabel="Medio"
          strongLabel="Fuerte"
          errorMessage
          [showErrors]="resetPasswordFormService.showErrorSignal()"
        >
          <ng-template #footer>
            <app-password-feedback [password]="resetPasswordFormService.passwordSignal()"></app-password-feedback>
          </ng-template>
        </p-password>
      </div>
      <div class="flex flex-col gap-1.5">
        <label for="confirmPassword" class="text-sm text-ink-primary-w">Confirmar contraseña</label>
        <p-password
          id="confirmPassword"
          formControlName="confirmPassword"
          variant="filled"
          fluid
          [toggleMask]="true"
          autocomplete="off"
          [feedback]="false"
          errorMessage
          [showErrors]="resetPasswordFormService.showErrorSignal()"
        />
      </div>
      <div>
        <p-button
          label="Restablecer contraseña"
          fluid
          (onClick)="onResetPassword()"
        ></p-button>
      </div>
      <div>
        <a class="text-sm text-ink-muted-w cursor-pointer" routerLink="/auth/login"
          >¿Quieres regresar? <span class="text-ink-primary-w hover:underline">Inicia sesión</span></a
        >
      </div>
    </form>
  }
</div>
